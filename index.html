
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Break Slots — One Pick</title>
  <meta name="theme-color" content="#0f172a" />
  <style>
    :root{
      --bg:#0b1020;--card:#111836;--muted:#9aa5b1;--text:#fff;
      --accent:#58e1c1;--accent-2:#9b9dfc;--danger:#ff6961;--ring:rgba(88,225,193,.35);
      --shadow:0 10px 30px rgba(0,0,0,.35);--radius:14px
    }
    @media (prefers-color-scheme: light){
      :root{--bg:#f7f7fb;--card:#fff;--muted:#6b7280;--text:#0f172a;
        --accent:#0891b2;--accent-2:#7c3aed;--danger:#dc2626;--ring:rgba(8,145,178,.18);
        --shadow:0 10px 30px rgba(0,0,0,.10)}
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
      background:radial-gradient(1200px 600px at 70% -10%,rgba(88,225,193,.12),transparent 60%),
                 radial-gradient(1200px 600px at 10% 100%,rgba(155,157,252,.12),transparent 60%),var(--bg);
      color:var(--text);-webkit-tap-highlight-color:transparent
    }
    .wrap{max-width:780px;margin:0 auto;padding:clamp(16px,4vw,32px)}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    h1{font-size:clamp(20px,4.5vw,28px);margin:0}
    .sub{color:var(--muted);font-size:13px;margin-top:4px}
    .card{background:var(--card);border:1px solid rgba(255,255,255,.06);box-shadow:var(--shadow);border-radius:var(--radius)}
    .time-row{display:flex;flex-wrap:wrap;gap:8px;padding:10px}
    .chip{
      user-select:none;padding:10px 14px;font-weight:600;border-radius:12px;border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.03));color:var(--text);cursor:pointer;
      box-shadow:0 2px 0 rgba(0,0,0,.12);transition:transform .08s, box-shadow .08s, border-color .2s;outline:none
    }
    .chip[aria-pressed="true"]{border-color:var(--accent);box-shadow:0 0 0 6px var(--ring)}
    .chip:active{transform:translateY(1px)}
    .slots{display:grid;grid-template-columns:1fr;gap:12px;padding:12px}
    .slot{
      position:relative;overflow:hidden;min-height:120px;border-radius:14px;
      background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(0,0,0,.06));
      border:1px dashed rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;
      padding:14px;text-align:center;isolation:isolate
    }
    .slot h3{position:absolute;top:8px;left:10px;margin:0;font-size:12px;color:var(--muted);letter-spacing:.3px}
    .value{font-size:clamp(18px,4.2vw,24px);font-weight:800;line-height:1.25}
    .ghost{position:absolute;inset:0;opacity:.12;filter:blur(10px);
      background:radial-gradient(300px 120px at 50% -20%,var(--accent),transparent 50%);pointer-events:none}
    .controls{display:flex;gap:10px;padding:12px;flex-wrap:wrap;align-items:center}
    button{
      border:0;border-radius:12px;padding:12px 14px;font-weight:700;cursor:pointer;
      background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 8px 20px rgba(0,0,0,.25);
      transition:transform .06s ease
    }
    button:active{transform:translateY(1px)}
    .ghost-btn{background:transparent;color:var(--text);border:1px solid rgba(255,255,255,.12)}
    .danger{background:linear-gradient(180deg,var(--danger),#b91c1c)}
    .row{display:flex;gap:12px;padding:12px;flex-wrap:wrap}
    input,select{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--text);outline:none}
    input:focus,select:focus{box-shadow:0 0 0 6px var(--ring);border-color:var(--accent)}
    label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
    .timer{display:flex;align-items:center;justify-content:space-between;padding:12px;border-top:1px dashed rgba(255,255,255,.14)}
    .clock{font-variant-numeric:tabular-nums;font-weight:800;letter-spacing:.5px}
    .small{font-size:12px;color:var(--muted)}
    footer{text-align:center;color:var(--muted);font-size:12px;margin-top:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>Break Slots</h1>
        <div class="sub">Pick a time → Spin → Do one thing. Only your activities are used.</div>
      </div>
      <button id="spin" aria-label="Spin">🎰 Spin</button>
    </header>

    <section class="card" aria-label="Time options">
      <div class="time-row" id="timeChips"></div>

      <div class="slots">
        <div class="slot" aria-live="polite">
          <div class="ghost"></div>
          <h3>Activity</h3>
          <div class="value" id="slot0">Add an activity below ↓</div>
        </div>
      </div>

      <div class="controls">
        <button id="spinSecondary" class="ghost-btn">Spin</button>
        <button id="startTimer">⏱️ Start Timer</button>
        <button id="clearTimer" class="ghost-btn">Clear Timer</button>
      </div>

      <div class="timer">
        <div>
          <div class="small">Selected time</div>
          <div id="selectedTime" class="clock">—</div>
        </div>
        <div>
          <div class="small">Countdown</div>
          <div id="countdown" class="clock">00:00</div>
        </div>
      </div>
    </section>

    <section class="card" style="margin-top:14px">
      <div class="row">
        <div style="flex:2 1 220px">
          <label for="newItem">Add your own activity</label>
          <input id="newItem" placeholder="e.g., 10 push-ups / 5-min walk / doodle" />
        </div>
        <div style="flex:1 1 110px">
          <label for="newMinutes">Time</label>
          <select id="newMinutes">
            <option value="5">5 min</option>
            <option value="10">10 min</option>
            <option value="15">15 min</option>
            <option value="20">20 min</option>
            <option value="30">30+ min</option>
          </select>
        </div>
        <div style="flex:0 0 auto; align-self:end">
          <button id="addItem">Add</button>
        </div>
      </div>

      <div class="row" style="padding-top:0">
        <button id="exportBtn" class="ghost-btn">Export</button>
        <input id="importInput" type="file" accept="application/json" style="display:none" />
        <button id="importBtn" class="ghost-btn">Import</button>
        <button id="resetBtn" class="danger">Reset (clear my list)</button>
      </div>
    </section>

    <footer>
      Only your activities are used. Saved locally on this device (Local Storage).
    </footer>
  </div>

  <script>
  /* ===== Only-user-data version with robust persistence ===== */
  const EMPTY = {5:[],10:[],15:[],20:[],30:[]}; // no defaults
  const STORAGE_KEY = "breakSlotsData_userOnly_v1";

  const $ = (s,el=document)=>el.querySelector(s);
  const $$ = (s,el=document)=>Array.from(el.querySelectorAll(s));

  function storageOK(){
    try {
      const t="__test__";
      localStorage.setItem(t,"1");
      localStorage.removeItem(t);
      return true;
    } catch(e){ return false; }
  }
  const STORAGE_WORKS = storageOK();

  function loadData(){
    if(!STORAGE_WORKS) return structuredClone(EMPTY);
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return structuredClone(EMPTY);
    try{
      const p = JSON.parse(raw);
      return {
        5: Array.isArray(p["5"])? p["5"] : [],
        10: Array.isArray(p["10"])? p["10"] : [],
        15: Array.isArray(p["15"])? p["15"] : [],
        20: Array.isArray(p["20"])? p["20"] : [],
        30: Array.isArray(p["30"])? p["30"] : []
      };
    }catch{ return structuredClone(EMPTY); }
  }
  function saveData(d){
    if(STORAGE_WORKS){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    } else {
      // Fallback: auto download a backup so you don’t lose items
      const blob = new Blob([JSON.stringify(d,null,2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "my-break-activities-backup.json"; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 1500);
    }
  }

  let DATA = loadData();
  const timeBuckets = [5,10,15,20,30];
  let selectedTime = 10;
  let timerId=null, endsAt=null;

  if(!STORAGE_WORKS){
    setTimeout(()=>alert(
      "Heads up: persistent storage is disabled (Private mode or blocking cookies). " +
      "Your items won’t survive a close unless you keep the auto-backup files."
    ), 50);
  }

  function makeChips(){
    const row = $("#timeChips");
    row.innerHTML="";
    timeBuckets.forEach(min=>{
      const b=document.createElement("button");
      b.className="chip"; b.type="button";
      b.textContent = (min===30) ? "30+ min" : `${min} min`;
      b.setAttribute("aria-pressed", String(min===selectedTime));
      b.addEventListener("click", ()=>{
        selectedTime=min;
        $$(".chip",row).forEach(c=>c.setAttribute("aria-pressed","false"));
        b.setAttribute("aria-pressed","true");
        updateSelectedTime();
        spin();
      });
      row.appendChild(b);
    });
    updateSelectedTime();
  }
  function updateSelectedTime(){
    $("#selectedTime").textContent = (selectedTime===30) ? "30+ minutes" : `${selectedTime} minutes`;
  }

  const rand = arr => arr[Math.floor(Math.random()*arr.length)];
  function pickFromBucket(min){
    const pool = DATA[String(min)] || [];
    return pool.length ? rand(pool) : "No activities yet for this time. Add one below ↓";
  }
  function animateSlot(el, finalText){
    const pool = DATA[String(selectedTime)] || [];
    if(!pool.length){ el.textContent = finalText; return; }
    let i=0, start=performance.now(), spinTime=600+Math.random()*400;
    const tick = now=>{
      const t = now - start;
      if(t < spinTime){
        el.style.transform = (i%2===0) ? "translateY(2px)" : "translateY(0)";
        el.textContent = rand(pool);
        i++; requestAnimationFrame(tick);
      } else { el.style.transform = "translateY(0)"; el.textContent = finalText; }
    };
    requestAnimationFrame(tick);
  }
  function spin(){
    const el = $("#slot0");
    const text = pickFromBucket(selectedTime);
    animateSlot(el, text);
  }

  // Timer
  function startTimer(){
    clearTimer();
    const minutes = selectedTime===30 ? 30 : selectedTime;
    endsAt = Date.now() + minutes*60*1000;
    tickTimer();
    timerId = setInterval(tickTimer, 500);
    if("vibrate" in navigator) try{navigator.vibrate(30)}catch{}
  }
  function tickTimer(){
    const left = Math.max(0, endsAt - Date.now());
    const mm = String(Math.floor(left/60000)).padStart(2,"0");
    const ss = String(Math.floor((left%60000)/1000)).padStart(2,"0");
    $("#countdown").textContent = `${mm}:${ss}`;
    if(left<=0){
      clearTimer();
      document.title="⏱️ Break done!";
      if("vibrate" in navigator) try{navigator.vibrate([80,60,80])}catch{}
      alert("Time's up! Nice break ✨");
    }
  }
  function clearTimer(){
    if(timerId) clearInterval(timerId);
    timerId=null; endsAt=null;
    $("#countdown").textContent="00:00";
    document.title="Break Slots — One Pick";
  }

  // Add / Export / Import / Reset
  function addItem(){
    const text = $("#newItem").value.trim();
    const mins = parseInt($("#newMinutes").value,10);
    if(!text){ $("#newItem").focus(); return; }
    const k = String(mins);
    DATA[k] = Array.from(new Set([...(DATA[k]||[]), text]));
    saveData(DATA);                 // <- persist immediately
    $("#newItem").value="";
    selectedTime = mins;
    $$(".chip").forEach(c=>c.setAttribute("aria-pressed","false"));
    $$(".chip").find(c=>c.textContent.includes(mins===30?"30+":String(mins)))?.setAttribute("aria-pressed","true");
    updateSelectedTime();
    spin();
  }
  function exportData(){
    const blob = new Blob([JSON.stringify(DATA,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download="my-break-activities.json"; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 1500);
  }
  function importData(file){
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const parsed = JSON.parse(r.result);
        ["5","10","15","20","30"].forEach(k=>{
          const arr = Array.isArray(parsed[k]) ? parsed[k] : [];
          DATA[k] = Array.from(new Set([...(DATA[k]||[]), ...arr]));
        });
        saveData(DATA);
        spin();
        alert("Imported ✅");
      }catch(e){ alert("Invalid JSON file."); }
    };
    r.readAsText(file);
  }
  function resetData(){
    if(!confirm("Clear ALL my activities?")) return;
    DATA = structuredClone(EMPTY);
    saveData(DATA);
    $("#slot0").textContent = "Add an activity below ↓";
  }

  // Events
  $("#spin").addEventListener("click", spin);
  $("#spinSecondary").addEventListener("click", spin);
  $("#startTimer").addEventListener("click", startTimer);
  $("#clearTimer").addEventListener("click", clearTimer);
  $("#addItem").addEventListener("click", addItem);
  $("#exportBtn").addEventListener("click", exportData);
  $("#importBtn").addEventListener("click", ()=>$("#importInput").click());
  $("#importInput").addEventListener("change", e=>{
    const f = e.target.files?.[0]; if(f) importData(f); e.target.value="";
  });
  $("#resetBtn").addEventListener("click", resetData);

  // Init
  makeChips();
  spin();
</script>
</body>
</html>
