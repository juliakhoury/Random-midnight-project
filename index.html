<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moving Abroad — Packing Checklist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f5f0eb;
      font-family: 'Courier New', Courier, monospace;
      color: #2a2420;
      padding: 32px 16px;
    }
    .container { max-width: 540px; margin: 0 auto; }
    .header { margin-bottom: 32px; border-bottom: 3px solid #2a2420; padding-bottom: 20px; }
    .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; text-transform: uppercase; }
    .subtitle { margin: 4px 0 16px; font-size: 13px; color: #8a7e74; letter-spacing: 2px; text-transform: uppercase; }
    .progress-row { display: flex; align-items: center; gap: 12px; }
    .progress-bar { flex: 1; height: 8px; background: #ddd5cb; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease, background 0.3s ease; }
    .progress-count { font-size: 13px; font-weight: 700; min-width: 80px; text-align: right; }
    .category { margin-bottom: 28px; }
    .cat-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; border-bottom: 1px solid #ccc3b8; padding-bottom: 4px; }
    .cat-header h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; transition: color 0.2s; }
    .cat-header h2.done { color: #5a8a5e; text-decoration: line-through; }
    .cat-count { font-size: 11px; color: #8a7e74; }
    .item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px dotted #ddd5cb; }
    .checkbox {
      width: 22px; height: 22px; border-radius: 4px; border: 2px solid #b5aa9e;
      background: transparent; color: #fff; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s ease;
    }
    .checkbox.checked { border-color: #5a8a5e; background: #5a8a5e; }
    .checkbox svg { display: none; }
    .checkbox.checked svg { display: block; }
    .item-name { flex: 1; font-size: 14px; transition: all 0.15s ease; }
    .item-name.checked { color: #8a7e74; text-decoration: line-through; }
    .del-btn { background: none; border: none; color: #c4b8ac; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; }
    .del-btn:hover { color: #c47a4a; }
    .add-btn {
      display: flex; align-items: center; gap: 6px; margin-top: 6px; padding: 4px 0;
      background: none; border: none; color: #b5aa9e; font-size: 12px;
      font-family: inherit; cursor: pointer; letter-spacing: 0.5px;
    }
    .add-btn:hover { color: #c47a4a; }
    .add-row { display: flex; gap: 8px; margin-top: 8px; }
    .add-row input {
      flex: 1; padding: 6px 10px; font-size: 13px; font-family: inherit;
      border: 1.5px solid #c4b8ac; border-radius: 4px; background: #faf7f4; outline: none;
    }
    .add-row input:focus { border-color: #c47a4a; }
    .btn-go {
      padding: 6px 14px; font-size: 12px; font-weight: 700; font-family: inherit;
      background: #2a2420; color: #f5f0eb; border: none; border-radius: 4px;
      cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    }
    .btn-x {
      padding: 6px 10px; font-size: 12px; font-family: inherit; background: none;
      border: 1.5px solid #c4b8ac; border-radius: 4px; cursor: pointer; color: #8a7e74;
    }
    .new-cat { margin-top: 16px; padding-top: 16px; border-top: 2px solid #2a2420; }
    .new-cat-btn {
      display: flex; align-items: center; gap: 8px; padding: 8px 0; background: none;
      border: none; color: #8a7e74; font-size: 13px; font-family: inherit;
      cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    }
    .new-cat-btn:hover { color: #c47a4a; }
    .new-cat-row { display: flex; gap: 8px; }
    .new-cat-row input {
      flex: 1; padding: 8px 10px; font-size: 13px; font-family: inherit;
      border: 1.5px solid #c4b8ac; border-radius: 4px; background: #faf7f4; outline: none;
    }
    .new-cat-row input:focus { border-color: #c47a4a; }
    .new-cat-row .btn-go { padding: 8px 16px; }
    .new-cat-row .btn-x { padding: 8px 10px; }
    .tip { margin-top: 32px; font-size: 11px; color: #b5aa9e; text-align: center; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Moving Abroad</h1>
      <p class="subtitle">Packing Checklist</p>
      <div class="progress-row">
        <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
        <span class="progress-count" id="pCount"></span>
      </div>
    </div>
    <div id="cats"></div>
    <div class="new-cat" id="newCat"></div>
    <p class="tip">Tip: wear your bulkiest coat &amp; shoes on the plane</p>
  </div>
<script>
(function() {
  var INIT = {
    "Summer Clothing": ["Lightweight tops (4\u20135)","Shorts (2)","Light pants or skirt","Sundress / going-out piece"],
    "Winter Clothing": ["Coat or parka","Fleece or sweater","Long-sleeve shirts (2\u20133)","Pants / jeans (2)","Thermals or warm leggings","Scarf, beanie & gloves"],
    "Year-Round Essentials": ["Underwear (7 days)","Socks (7 days)","Pajamas","Formal / interview outfit","Workout clothes","Sturdy shoes (wear on plane)","Light shoes or sneakers","Sandals / flip-flops"],
    "Toiletries & Health": ["Toothbrush & toothpaste","Deodorant","Shampoo & conditioner","Sunscreen","Razor","Nail clippers","Prescriptions & medications","First aid basics","Quick-dry towel"],
    "Documents & Money": ["Passport","Visa paperwork","Work contract / offer letter","Diplomas & certificates","Medical records","Digital backups of all docs","Credit / debit cards (1\u20132)","Small amount of local cash"],
    "Tech & Electronics": ["Phone & charger","Power adapter (destination type)","Portable battery pack","Earbuds / headphones","Laptop + charger (if needed)"],
    "Practical Extras": ["Daypack or packable tote","Packing cubes","Reusable water bottle","Travel lock","Earplugs & sleep mask","Ziplock bags","Pen"]
  };

var data = {};
var catOrder = [];
Object.keys(INIT).forEach(function(cat) {
catOrder.push(cat);
data[cat] = INIT[cat].map(function(n) { return { name: n, checked: false }; });
});

var addingTo = null;
var showNewCat = false;

var IC = ‘<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>’;
var IT = ‘<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V4m1.5 0v7.5a1 1 0 01-1 1h-5a1 1 0 01-1-1V4h8z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>’;
var IP = ‘<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 2v10M2 7h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>’;

function esc(s) { var d = document.createElement(“div”); d.textContent = s; return d.innerHTML; }

function progress() {
var t = 0, c = 0;
catOrder.forEach(function(cat) {
if (!data[cat]) return;
t += data[cat].length;
data[cat].forEach(function(i) { if (i.checked) c++; });
});
var pct = t ? Math.round(c / t * 100) : 0;
var fill = document.getElementById(“pFill”);
fill.style.width = pct + “%”;
fill.style.background = pct === 100 ? “#5a8a5e” : “#c47a4a”;
document.getElementById(“pCount”).textContent = c + “ / “ + t;
}

function render() {
var h = “”;
catOrder.forEach(function(cat, ci) {
if (!data[cat]) return;
var items = data[cat];
var cc = 0;
items.forEach(function(i) { if (i.checked) cc++; });
var done = items.length > 0 && cc === items.length;

```
  h += '<div class="category">';
  h += '<div class="cat-header"><h2' + (done ? ' class="done"' : '') + '>' + esc(cat) + '</h2>';
  h += '<span class="cat-count">' + cc + '/' + items.length + '</span></div>';

  items.forEach(function(item, idx) {
    h += '<div class="item">';
    h += '<button class="checkbox' + (item.checked ? ' checked' : '') + '" data-cat="' + ci + '" data-idx="' + idx + '">' + IC + '</button>';
    h += '<span class="item-name' + (item.checked ? ' checked' : '') + '">' + esc(item.name) + '</span>';
    h += '<button class="del-btn" data-cat="' + ci + '" data-idx="' + idx + '">' + IT + '</button>';
    h += '</div>';
  });

  if (addingTo === cat) {
    h += '<div class="add-row"><input id="addInp" placeholder="New item..." />';
    h += '<button class="btn-go" id="addGo" data-cat="' + ci + '">Add</button>';
    h += '<button class="btn-x" id="addCancel">\u2715</button></div>';
  } else {
    h += '<button class="add-btn" data-cat="' + ci + '">' + IP + ' Add item</button>';
  }
  h += '</div>';
});

document.getElementById("cats").innerHTML = h;
progress();

if (addingTo) {
  var inp = document.getElementById("addInp");
  if (inp) inp.focus();
}
renderNewCat();
```

}

function renderNewCat() {
var sec = document.getElementById(“newCat”);
if (showNewCat) {
sec.innerHTML = ‘<div class="new-cat-row"><input id="ncInp" placeholder="Category name..." />’ +
‘<button class="btn-go" id="ncGo">Create</button>’ +
‘<button class="btn-x" id="ncCancel">\u2715</button></div>’;
document.getElementById(“ncInp”).focus();
} else {
sec.innerHTML = ‘<button class="new-cat-btn" id="ncBtn">’ + IP + ’ Add new category</button>’;
}
}

// Event delegation
document.addEventListener(“click”, function(e) {
var t = e.target.closest(“button”);
if (!t) return;

```
if (t.classList.contains("checkbox")) {
  var ci = +t.dataset.cat, idx = +t.dataset.idx;
  var cat = catOrder[ci];
  data[cat][idx].checked = !data[cat][idx].checked;
  render();
} else if (t.classList.contains("del-btn")) {
  var ci = +t.dataset.cat, idx = +t.dataset.idx;
  var cat = catOrder[ci];
  data[cat].splice(idx, 1);
  if (data[cat].length === 0) { delete data[cat]; catOrder.splice(ci, 1); }
  render();
} else if (t.classList.contains("add-btn")) {
  addingTo = catOrder[+t.dataset.cat];
  render();
} else if (t.id === "addGo") {
  commitAdd();
} else if (t.id === "addCancel") {
  addingTo = null;
  render();
} else if (t.id === "ncBtn") {
  showNewCat = true;
  renderNewCat();
} else if (t.id === "ncGo") {
  commitNewCat();
} else if (t.id === "ncCancel") {
  showNewCat = false;
  renderNewCat();
}
```

});

document.addEventListener(“keydown”, function(e) {
if (e.key === “Enter”) {
if (e.target.id === “addInp”) commitAdd();
if (e.target.id === “ncInp”) commitNewCat();
}
});

function commitAdd() {
var inp = document.getElementById(“addInp”);
var val = inp ? inp.value.trim() : “”;
if (!val) return;
data[addingTo].push({ name: val, checked: false });
addingTo = null;
render();
}

function commitNewCat() {
var inp = document.getElementById(“ncInp”);
var val = inp ? inp.value.trim() : “”;
if (!val || data[val]) return;
data[val] = [];
catOrder.push(val);
showNewCat = false;
addingTo = val;
render();
}

render();
})();
</script>

</body>
</html>
