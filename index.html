<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moving Abroad — Packing Checklist</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f5f0eb;
      font-family: 'Courier New', Courier, monospace;
      color: #2a2420;
      padding: 32px 16px;
    }
    .wrap { max-width: 540px; margin: 0 auto; }
    .hdr { margin-bottom: 32px; border-bottom: 3px solid #2a2420; padding-bottom: 20px; }
    .hdr h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; text-transform: uppercase; }
    .sub { margin: 4px 0 16px; font-size: 13px; color: #8a7e74; letter-spacing: 2px; text-transform: uppercase; }
    .prow { display: flex; align-items: center; gap: 12px; }
    .pbar { flex: 1; height: 8px; background: #ddd5cb; border-radius: 4px; overflow: hidden; }
    .pfill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
    .pcnt { font-size: 13px; font-weight: 700; min-width: 80px; text-align: right; }
    .cat { margin-bottom: 28px; }
    .cat-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; border-bottom: 1px solid #ccc3b8; padding-bottom: 4px; }
    .cat-top h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
    .cat-top h2.alldone { color: #5a8a5e; text-decoration: line-through; }
    .cat-top span { font-size: 11px; color: #8a7e74; }
    .row { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px dotted #ddd5cb; }
    .cb {
      width: 22px; height: 22px; border-radius: 4px; border: 2px solid #b5aa9e;
      background: transparent; color: #fff; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cb.on { border-color: #5a8a5e; background: #5a8a5e; }
    .cb svg { visibility: hidden; }
    .cb.on svg { visibility: visible; }
    .lbl { flex: 1; font-size: 14px; }
    .lbl.on { color: #8a7e74; text-decoration: line-through; }
    .rm { background: none; border: none; color: #c4b8ac; cursor: pointer; padding: 4px; display: flex; align-items: center; }
    .rm:hover { color: #c47a4a; }
    .addbtn {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 6px; padding: 4px 0;
      background: none; border: none; color: #b5aa9e; font-size: 12px;
      font-family: inherit; cursor: pointer; letter-spacing: 0.5px;
    }
    .addbtn:hover { color: #c47a4a; }
    .irow { display: flex; gap: 8px; margin-top: 8px; }
    .irow input {
      flex: 1; padding: 6px 10px; font-size: 13px; font-family: inherit;
      border: 1.5px solid #c4b8ac; border-radius: 4px; background: #faf7f4; outline: none;
    }
    .irow input:focus { border-color: #c47a4a; }
    .go {
      padding: 6px 14px; font-size: 12px; font-weight: 700; font-family: inherit;
      background: #2a2420; color: #f5f0eb; border: none; border-radius: 4px;
      cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    }
    .xx {
      padding: 6px 10px; font-size: 12px; font-family: inherit; background: none;
      border: 1.5px solid #c4b8ac; border-radius: 4px; cursor: pointer; color: #8a7e74;
    }
    .nc { margin-top: 16px; padding-top: 16px; border-top: 2px solid #2a2420; }
    .ncbtn {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 0; background: none;
      border: none; color: #8a7e74; font-size: 13px; font-family: inherit;
      cursor: pointer; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    }
    .ncbtn:hover { color: #c47a4a; }
    .ncrow { display: flex; gap: 8px; }
    .ncrow input {
      flex: 1; padding: 8px 10px; font-size: 13px; font-family: inherit;
      border: 1.5px solid #c4b8ac; border-radius: 4px; background: #faf7f4; outline: none;
    }
    .ncrow input:focus { border-color: #c47a4a; }
    .ncrow .go { padding: 8px 16px; }
    .ncrow .xx { padding: 8px 10px; }
    .tip { margin-top: 32px; font-size: 11px; color: #b5aa9e; text-align: center; letter-spacing: 0.5px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <h1>Moving Abroad</h1>
    <p class="sub">Packing Checklist</p>
    <div class="prow">
      <div class="pbar"><div class="pfill" id="pf"></div></div>
      <span class="pcnt" id="pc"></span>
    </div>
  </div>
  <div id="main"></div>
  <div class="nc" id="nc"></div>
  <p class="tip">Tip: wear your bulkiest coat &amp; shoes on the plane</p>
</div>
<script src="app.js"></script>
</body>
</html>
