<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

```
const INITIAL_ITEMS = {
  "Summer Clothing": [
    "Lightweight tops (4–5)", "Shorts (2)",
    "Light pants or skirt", "Sundress / going-out piece",
  ],
  "Winter Clothing": [
    "Coat or parka", "Fleece or sweater",
    "Long-sleeve shirts (2–3)", "Pants / jeans (2)",
    "Thermals or warm leggings", "Scarf, beanie & gloves",
  ],
  "Year-Round Essentials": [
    "Underwear (7 days)", "Socks (7 days)", "Pajamas",
    "Formal / interview outfit", "Workout clothes",
    "Sturdy shoes (wear on plane)", "Light shoes or sneakers",
    "Sandals / flip-flops",
  ],
  "Toiletries & Health": [
    "Toothbrush & toothpaste", "Deodorant",
    "Shampoo & conditioner", "Sunscreen", "Razor",
    "Nail clippers", "Prescriptions & medications",
    "First aid basics", "Quick-dry towel",
  ],
  "Documents & Money": [
    "Passport", "Visa paperwork", "Work contract / offer letter",
    "Diplomas & certificates", "Medical records",
    "Digital backups of all docs", "Credit / debit cards (1–2)",
    "Small amount of local cash",
  ],
  "Tech & Electronics": [
    "Phone & charger", "Power adapter (destination type)",
    "Portable battery pack", "Earbuds / headphones",
    "Laptop + charger (if needed)",
  ],
  "Practical Extras": [
    "Daypack or packable tote", "Packing cubes",
    "Reusable water bottle", "Travel lock",
    "Earplugs & sleep mask", "Ziplock bags", "Pen",
  ],
};

function CheckIcon() {
  return (
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2.5 7.5L5.5 10.5L11.5 3.5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function TrashIcon() {
  return (
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2 4h10M5 4V2.5a.5.5 0 01.5-.5h3a.5.5 0 01.5.5V4m1.5 0v7.5a1 1 0 01-1 1h-5a1 1 0 01-1-1V4h8z"
        stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function PlusIcon() {
  return (
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 2v10M2 7h10" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

function PackingChecklist() {
  const [items, setItems] = useState(() => {
    const init = {};
    Object.entries(INITIAL_ITEMS).forEach(([cat, list]) => {
      init[cat] = list.map((name) => ({ name, checked: false }));
    });
    return init;
  });

  const [newItemText, setNewItemText] = useState({});
  const [addingTo, setAddingTo] = useState(null);
  const [newCatName, setNewCatName] = useState("");
  const [showNewCat, setShowNewCat] = useState(false);

  const toggle = (cat, idx) => {
    setItems((prev) => {
      const copy = { ...prev, [cat]: [...prev[cat]] };
      copy[cat][idx] = { ...copy[cat][idx], checked: !copy[cat][idx].checked };
      return copy;
    });
  };

  const removeItem = (cat, idx) => {
    setItems((prev) => {
      const copy = { ...prev, [cat]: prev[cat].filter((_, i) => i !== idx) };
      if (copy[cat].length === 0) delete copy[cat];
      return copy;
    });
  };

  const addItem = (cat) => {
    const text = (newItemText[cat] || "").trim();
    if (!text) return;
    setItems((prev) => ({
      ...prev,
      [cat]: [...prev[cat], { name: text, checked: false }],
    }));
    setNewItemText((p) => ({ ...p, [cat]: "" }));
    setAddingTo(null);
  };

  const addCategory = () => {
    const name = newCatName.trim();
    if (!name || items[name]) return;
    setItems((prev) => ({ ...prev, [name]: [] }));
    setNewCatName("");
    setShowNewCat(false);
    setAddingTo(name);
  };

  const totalItems = Object.values(items).flat().length;
  const checkedItems = Object.values(items).flat().filter((i) => i.checked).length;
  const pct = totalItems ? Math.round((checkedItems / totalItems) * 100) : 0;

  const categories = Object.keys(items);

  return (
    <div style={{ padding: "32px 16px" }}>
      <div style={{ maxWidth: 540, margin: "0 auto" }}>

        <div style={{ marginBottom: 32, borderBottom: "3px solid #2a2420", paddingBottom: 20 }}>
          <h1 style={{ fontSize: 28, fontWeight: 700, margin: 0, letterSpacing: "-0.5px", textTransform: "uppercase" }}>
            Moving Abroad
          </h1>
          <p style={{ margin: "4px 0 16px", fontSize: 13, color: "#8a7e74", letterSpacing: 2, textTransform: "uppercase" }}>
            Packing Checklist
          </p>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <div style={{ flex: 1, height: 8, background: "#ddd5cb", borderRadius: 4, overflow: "hidden" }}>
              <div style={{
                width: pct + "%", height: "100%",
                background: pct === 100 ? "#5a8a5e" : "#c47a4a",
                borderRadius: 4, transition: "width 0.4s ease",
              }} />
            </div>
            <span style={{ fontSize: 13, fontWeight: 700, minWidth: 80, textAlign: "right" }}>
              {checkedItems} / {totalItems}
            </span>
          </div>
        </div>

        {categories.map((cat) => {
          const catItems = items[cat];
          const catChecked = catItems.filter((i) => i.checked).length;
          const allDone = catItems.length > 0 && catChecked === catItems.length;

          return (
            <div key={cat} style={{ marginBottom: 28 }}>
              <div style={{
                display: "flex", justifyContent: "space-between", alignItems: "baseline",
                marginBottom: 8, borderBottom: "1px solid #ccc3b8", paddingBottom: 4,
              }}>
                <h2 style={{
                  fontSize: 14, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1.5,
                  margin: 0, color: allDone ? "#5a8a5e" : "#2a2420",
                  textDecoration: allDone ? "line-through" : "none",
                }}>
                  {cat}
                </h2>
                <span style={{ fontSize: 11, color: "#8a7e74" }}>{catChecked}/{catItems.length}</span>
              </div>

              {catItems.map((item, idx) => (
                <div key={idx} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "7px 0", borderBottom: "1px dotted #ddd5cb",
                }}>
                  <button onClick={() => toggle(cat, idx)} style={{
                    width: 22, height: 22, borderRadius: 4,
                    border: item.checked ? "2px solid #5a8a5e" : "2px solid #b5aa9e",
                    background: item.checked ? "#5a8a5e" : "transparent",
                    color: "#fff", cursor: "pointer", display: "flex",
                    alignItems: "center", justifyContent: "center", flexShrink: 0,
                    transition: "all 0.15s ease",
                  }}>
                    {item.checked && <CheckIcon />}
                  </button>
                  <span style={{
                    flex: 1, fontSize: 14,
                    color: item.checked ? "#8a7e74" : "#2a2420",
                    textDecoration: item.checked ? "line-through" : "none",
                    transition: "all 0.15s ease",
                  }}>
                    {item.name}
                  </span>
                  <button onClick={() => removeItem(cat, idx)} style={{
                    background: "none", border: "none", color: "#c4b8ac",
                    cursor: "pointer", padding: 4, borderRadius: 4, display: "flex", alignItems: "center",
                  }}
                    onMouseEnter={(e) => e.currentTarget.style.color = "#c47a4a"}
                    onMouseLeave={(e) => e.currentTarget.style.color = "#c4b8ac"}
                  >
                    <TrashIcon />
                  </button>
                </div>
              ))}

              {addingTo === cat ? (
                <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                  <input autoFocus value={newItemText[cat] || ""}
                    onChange={(e) => setNewItemText((p) => ({ ...p, [cat]: e.target.value }))}
                    onKeyDown={(e) => e.key === "Enter" && addItem(cat)}
                    placeholder="New item..."
                    style={{
                      flex: 1, padding: "6px 10px", fontSize: 13, fontFamily: "inherit",
                      border: "1.5px solid #c4b8ac", borderRadius: 4, background: "#faf7f4",
                    }}
                  />
                  <button onClick={() => addItem(cat)} style={{
                    padding: "6px 14px", fontSize: 12, fontWeight: 700,
                    background: "#2a2420", color: "#f5f0eb", border: "none",
                    borderRadius: 4, cursor: "pointer", textTransform: "uppercase", letterSpacing: 1,
                  }}>Add</button>
                  <button onClick={() => setAddingTo(null)} style={{
                    padding: "6px 10px", fontSize: 12, background: "none",
                    border: "1.5px solid #c4b8ac", borderRadius: 4, cursor: "pointer", color: "#8a7e74",
                  }}>✕</button>
                </div>
              ) : (
                <button onClick={() => setAddingTo(cat)} style={{
                  display: "flex", alignItems: "center", gap: 6, marginTop: 6,
                  padding: "4px 0", background: "none", border: "none",
                  color: "#b5aa9e", fontSize: 12, cursor: "pointer", letterSpacing: 0.5,
                }}
                  onMouseEnter={(e) => e.currentTarget.style.color = "#c47a4a"}
                  onMouseLeave={(e) => e.currentTarget.style.color = "#b5aa9e"}
                >
                  <PlusIcon /> Add item
                </button>
              )}
            </div>
          );
        })}

        <div style={{ marginTop: 16, paddingTop: 16, borderTop: "2px solid #2a2420" }}>
          {showNewCat ? (
            <div style={{ display: "flex", gap: 8 }}>
              <input autoFocus value={newCatName}
                onChange={(e) => setNewCatName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && addCategory()}
                placeholder="Category name..."
                style={{
                  flex: 1, padding: "8px 10px", fontSize: 13, fontFamily: "inherit",
                  border: "1.5px solid #c4b8ac", borderRadius: 4, background: "#faf7f4",
                }}
              />
              <button onClick={addCategory} style={{
                padding: "8px 16px", fontSize: 12, fontWeight: 700,
                background: "#2a2420", color: "#f5f0eb", border: "none",
                borderRadius: 4, cursor: "pointer", textTransform: "uppercase", letterSpacing: 1,
              }}>Create</button>
              <button onClick={() => { setShowNewCat(false); setNewCatName(""); }} style={{
                padding: "8px 10px", fontSize: 12, background: "none",
                border: "1.5px solid #c4b8ac", borderRadius: 4, cursor: "pointer", color: "#8a7e74",
              }}>✕</button>
            </div>
          ) : (
            <button onClick={() => setShowNewCat(true)} style={{
              display: "flex", alignItems: "center", gap: 8, padding: "8px 0",
              background: "none", border: "none", color: "#8a7e74", fontSize: 13,
              cursor: "pointer", fontWeight: 700, textTransform: "uppercase", letterSpacing: 1,
            }}
              onMouseEnter={(e) => e.currentTarget.style.color = "#c47a4a"}
              onMouseLeave={(e) => e.currentTarget.style.color = "#8a7e74"}
            >
              <PlusIcon /> Add new category
            </button>
          )}
        </div>

        <p style={{ marginTop: 32, fontSize: 11, color: "#b5aa9e", textAlign: "center", letterSpacing: 0.5 }}>
          Tip: wear your bulkiest coat & shoes on the plane
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PackingChecklist />);
```

  </script>
